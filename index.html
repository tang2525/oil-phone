<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Oil Stain Interactive - Mobile & Desktop</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #f5f5f0; overflow: hidden; touch-action: none; font-family: sans-serif; }
    canvas { display: block; }
    
    /* ==========================================
       ✨ 新增：悬浮文字的 CSS 样式
       ========================================== */
    .top-hint {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #aaaaa5; /* 极其低调的高级灰 */
      /* 核心黑科技：让鼠标和手指能“穿透”这行字，点在画布上 */
      pointer-events: none; 
      z-index: 10;
      user-select: none;
    }

    .hint-cn { font-size: 18px; font-weight: bold; margin-bottom: 4px; letter-spacing: 1px; }
    .hint-en { font-size: 14.4px; }

    /* 手机端自动调小字号 */
    @media (max-width: 600px) {
      .hint-cn { font-size: 14px; }
      .hint-en { font-size: 11px; }
    }

    /* 底部按钮的样式（保持不变） */
    .controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 24px;
      z-index: 10;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #777; 
      backdrop-filter: blur(4px); 
      transition: all 0.2s ease;
    }

    .icon-btn:active {
      transform: scale(0.92); 
      background: rgba(240, 240, 240, 0.9);
    }

    .icon-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

<div class="top-hint">
  <div class="hint-cn">点点看！</div>
  <div class="hint-en">just click!</div>
</div>

<div class="controls">
  <button class="icon-btn" onclick="clearCanvas()" aria-label="Refresh">
    <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
  </button>
  <button class="icon-btn" onclick="saveDesign()" aria-label="Save">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
  </button>
</div>

<script>
let drops = [];

function setup() {
  createCanvas(windowWidth, windowHeight); 
  pixelDensity(1); 
  noStroke();
}

function draw() {
  background(245, 245, 240); 
  
  for (let i = 0; i < drops.length; i++) {
    drops[i].update();
  }
  
  loadPixels();
  let step = 3; 
  
  for (let x = 0; x < width; x += step) {
    for (let y = 0; y < height; y += step) {
      let sumCore = 0;
      let sumHalo = 0;
      
      for (let i = 0; i < drops.length; i++) {
        let d = drops[i];
        let dx = x - d.x;
        let dy = y - d.y;
        let distSq = dx * dx + dy * dy;
        
        if (distSq > 0) {
          sumCore += d.coreR2 / distSq;
          sumHalo += d.haloR2 / distSq;
        }
      }
      
      if (sumCore > 1 || sumHalo > 1) {
        for (let xo = 0; xo < step; xo++) {
          for (let yo = 0; yo < step; yo++) {
            let px = x + xo;
            let py = y + yo;
            if (px < width && py < height) {
              let index = (px + py * width) * 4;
              if (sumCore > 1) {
                pixels[index + 0] = 220; 
                pixels[index + 1] = 90;  
                pixels[index + 2] = 10;  
              } else {
                pixels[index + 0] = 240; 
                pixels[index + 1] = 160; 
                pixels[index + 2] = 50;  
              }
              pixels[index + 3] = 255;
            }
          }
        }
      }
    }
  }
  updatePixels();
  // 已经将原本在这里画文字的代码删掉了！
}

function clearCanvas() {
  drops = []; 
}

function saveDesign() {
  saveCanvas('oil-design', 'png'); 
}

function mousePressed(event) {
  if (event.target.closest('.icon-btn')) return; 

  if (mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
    drops.push(new OilDrop(mouseX, mouseY));
  }
}

function touchStarted(event) {
  if (event.target.closest('.icon-btn')) return true; 

  if (touches.length > 0) {
    drops.push(new OilDrop(touches[0].x, touches[0].y));
  }
  return false; 
}

class OilDrop {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.baseR = random(12, 20); 
    this.coreR = 1;
    this.haloR = 1;
    this.targetCoreR = this.baseR * 1.2;
    this.targetHaloR = this.baseR * random(1.8, 2.4);
    this.coreR2 = 1;
    this.haloR2 = 1;
  }
  
  update() {
    this.coreR = lerp(this.coreR, this.targetCoreR, 0.1);
    this.haloR = lerp(this.haloR, this.targetHaloR, 0.015);
    this.coreR2 = this.coreR * this.coreR;
    this.haloR2 = this.haloR * this.haloR;
  }
}
</script>
</body>
</html>
