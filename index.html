<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Oil Stain Interactive - Mobile UI & Audio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #f5f5f0; overflow: hidden; touch-action: none; font-family: sans-serif; }
    canvas { display: block; }
    
    /* ==========================================
       悬浮文字的 CSS 样式
       ========================================== */
    .top-hint {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      color: #aaaaa5; 
      pointer-events: none; 
      z-index: 10;
      user-select: none;
    }

    .hint-cn { font-size: 18px; font-weight: bold; margin-bottom: 4px; letter-spacing: 1px; }
    .hint-en { font-size: 14.4px; }

    @media (max-width: 600px) {
      .hint-cn { font-size: 14px; }
      .hint-en { font-size: 11px; }
    }

    /* 底部按钮的样式 */
    .controls {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 24px;
      z-index: 10;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(0, 0, 0, 0.05);
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #777; 
      backdrop-filter: blur(4px); 
      transition: all 0.2s ease;
    }

    .icon-btn:active {
      transform: scale(0.92); 
      background: rgba(240, 240, 240, 0.9);
    }

    .icon-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

<div class="top-hint">
  <div class="hint-cn">点点看！</div>
  <div class="hint-en">just click!</div>
</div>

<div class="controls">
  <button class="icon-btn" onclick="clearCanvas()" aria-label="Refresh">
    <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
  </button>
  <button class="icon-btn" onclick="saveDesign()" aria-label="Save">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
  </button>
</div>

<script>
let drops = [];

// 音频系统全局变量
let audioCtx; 
let reverbNode;

function setup() {
  createCanvas(windowWidth, windowHeight); 
  pixelDensity(1); 
  noStroke();
}

function draw() {
  background(245, 245, 240); 
  
  for (let i = 0; i < drops.length; i++) {
    drops[i].update();
  }
  
  loadPixels();
  let step = 3; 
  
  for (let x = 0; x < width; x += step) {
    for (let y = 0; y < height; y += step) {
      let sumCore = 0;
      let sumHalo = 0;
      
      for (let i = 0; i < drops.length; i++) {
        let d = drops[i];
        let dx = x - d.x;
        let dy = y - d.y;
        let distSq = dx * dx + dy * dy;
        
        if (distSq > 0) {
          sumCore += d.coreR2 / distSq;
          sumHalo += d.haloR2 / distSq;
        }
      }
      
      if (sumCore > 1 || sumHalo > 1) {
        for (let xo = 0; xo < step; xo++) {
          for (let yo = 0; yo < step; yo++) {
            let px = x + xo;
            let py = y + yo;
            if (px < width && py < height) {
              let index = (px + py * width) * 4;
              if (sumCore > 1) {
                pixels[index + 0] = 220; 
                pixels[index + 1] = 90;  
                pixels[index + 2] = 10;  
              } else {
                pixels[index + 0] = 240; 
                pixels[index + 1] = 160; 
                pixels[index + 2] = 50;  
              }
              pixels[index + 3] = 255;
            }
          }
        }
      }
    }
  }
  updatePixels();
}

function clearCanvas() {
  drops = []; 
}

function saveDesign() {
  saveCanvas('oil-design', 'png'); 
}

// ==========================================
// ✨ 核心交互处理：整合声音触发与距离检测
// ==========================================
function handleDropInteraction(posX, posY) {
  let newDrop = new OilDrop(posX, posY);
  let delayCount = 1;

  for (let i = 0; i < drops.length; i++) {
    let existingDrop = drops[i];
    let d = dist(newDrop.x, newDrop.y, existingDrop.x, existingDrop.y);
    
    if (d < (newDrop.targetHaloR + existingDrop.targetHaloR) * 1.1) {
      playOilDropSound(delayCount * 0.12); 
      delayCount++;
    }
  }

  drops.push(newDrop);
  playOilDropSound(0); 
}

function mousePressed(event) {
  // 防误触：如果点在 UI 按钮上，直接拦截
  if (event.target.closest('.icon-btn')) return; 

  // 确保没有触摸事件介入（防止移动端触发两次）
  if (touches.length === 0 && mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height) {
    handleDropInteraction(mouseX, mouseY);
  }
}

function touchStarted(event) {
  // 防误触：允许 UI 按钮被正常点击
  if (event.target.closest('.icon-btn')) return true; 

  if (touches.length > 0) {
    handleDropInteraction(touches[0].x, touches[0].y);
  }
  return false; // 阻止页面滑动
}

class OilDrop {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.baseR = random(12, 20); 
    this.coreR = 1;
    this.haloR = 1;
    this.targetCoreR = this.baseR * 1.2;
    this.targetHaloR = this.baseR * random(1.8, 2.4);
    this.coreR2 = 1;
    this.haloR2 = 1;
  }
  
  update() {
    this.coreR = lerp(this.coreR, this.targetCoreR, 0.1);
    this.haloR = lerp(this.haloR, this.targetHaloR, 0.015);
    this.coreR2 = this.coreR * this.coreR;
    this.haloR2 = this.haloR * this.haloR;
  }
}

// ==========================================
// ✨ 音频引擎（随机音阶 + 物理混响）
// ==========================================
function initAudio() {
  if (audioCtx) return; 
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  let duration = 3.0; 
  let decay = 2.0; 
  let sampleRate = audioCtx.sampleRate;
  let length = sampleRate * duration;
  let impulse = audioCtx.createBuffer(2, length, sampleRate);
  
  for (let c = 0; c < 2; c++) {
    let channelData = impulse.getChannelData(c);
    for (let i = 0; i < length; i++) {
      channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
    }
  }
  
  reverbNode = audioCtx.createConvolver();
  reverbNode.buffer = impulse;
  reverbNode.connect(audioCtx.destination);
}

function playOilDropSound(delayOffset = 0) {
  initAudio();
  
  // iOS Safari 安全机制
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }

  const now = audioCtx.currentTime + delayOffset;
  
  const scale = [
    130.81, 146.83, 164.81, 196.00, 220.00, 
    261.63, 293.66, 329.63, 392.00, 440.00, 
    523.25, 587.33, 659.25, 783.99, 880.00  
  ];
  const baseFreq = scale[Math.floor(Math.random() * scale.length)];

  // 1. 内圈
  const innerOsc = audioCtx.createOscillator();
  const innerGain = audioCtx.createGain();
  innerOsc.type = 'sine'; 
  
  innerOsc.frequency.setValueAtTime(baseFreq, now);

  innerGain.gain.setValueAtTime(0, now);
  innerGain.gain.linearRampToValueAtTime(0.4, now + 0.02); 
  innerGain.gain.exponentialRampToValueAtTime(0.001, now + 0.8); 

  innerOsc.connect(innerGain);
  innerGain.connect(audioCtx.destination); 
  innerOsc.start(now);
  innerOsc.stop(now + 1.0); 

  // 2. 外圈混响
  const outerOsc = audioCtx.createOscillator();
  const outerGain = audioCtx.createGain();
  outerOsc.type = 'sine'; 
  
  outerOsc.frequency.setValueAtTime(baseFreq * 0.25, now); 
  
  outerGain.gain.setValueAtTime(0, now);
  outerGain.gain.linearRampToValueAtTime(0.05, now + 0.2); 
  outerGain.gain.exponentialRampToValueAtTime(0.001, now + 2.5); 
  
  outerOsc.connect(outerGain);
  outerGain.connect(audioCtx.destination); 
  outerGain.connect(reverbNode);           

  outerOsc.start(now);
  outerOsc.stop(now + 2.6); 
}
</script>
</body>
</html>
